name: deploy_admin.vatadyaadventures.in

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Clone repo
              uses: actions/checkout@v4

            - name: Setup node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm ci

            - name: Build Project
              env:
                VITE_API_BASE_URL: https://api.vatadyaadventures.com/api
              run: npm run build

            - name: Copy to VPS
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HOST}}
                  username: ${{secrets.USER}}
                  key: ${{ secrets.PRIVATE_KEY}}
                  source: 'dist'
                  target: '/var/www/vatadyaadventures.in/admin'
